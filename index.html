<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 pb-12">

  <div class="max-w-6xl mx-auto px-4 py-8">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Finance Tracker</h1>
      <p class="text-gray-500 mt-2">Loan & Expense Monitoring System</p>
    </header>

    <!-- Tab Navigation -->
    <div class="flex justify-center space-x-4 mb-8">
      <button id="loanTabBtn" onclick="switchTab('loan')" class="px-6 py-2 rounded-lg font-medium bg-blue-600 text-white shadow transition">Loan Monitoring</button>
      <button id="expenseTabBtn" onclick="switchTab('expense')" class="px-6 py-2 rounded-lg font-medium bg-white text-gray-600 border hover:bg-gray-50 transition">Expense Monitoring</button>
    </div>

    <!-- ================= LOAN SECTION ================= -->
    <section id="loanSection" class="block space-y-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 relative">
        <h2 id="loanFormTitle" class="text-xl font-semibold mb-4 text-gray-900">Add New Loan</h2>
        <form id="loanForm" onsubmit="submitLoan(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <!-- Hidden input to store row index when editing -->
          <input type="hidden" id="loan_row_index" value="">
          
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Type of Loan</label><input type="text" id="loan_type" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Status</label><select id="status" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"><option value="Active">Active</option><option value="Fully Paid">Fully Paid</option><option value="Pending">Pending</option></select></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Amount</label><input type="number" id="amount" step="0.01" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Term (Months)</label><input type="number" id="term" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Date Approved</label><input type="date" id="date_approved" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Monthly Amortization</label><input type="number" id="monthly_amortization" step="0.01" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></div>
          
          <div class="md:col-span-3 flex justify-end space-x-3 mt-2">
            <button type="button" id="loanCancelBtn" onclick="cancelEdit('loan')" class="hidden px-6 py-2 rounded-lg font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition">Cancel</button>
            <button type="submit" id="loanSubmitBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-medium">Save Loan</button>
          </div>
        </form>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 overflow-x-auto">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-semibold text-gray-900">Loan Records</h2>
          <button onclick="fetchData('loans')" class="text-sm text-blue-600 hover:underline">↻ Refresh</button>
        </div>
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200 text-sm text-gray-600">
              <th class="p-3 font-medium">Type</th>
              <th class="p-3 font-medium">Status</th>
              <th class="p-3 font-medium">Amount</th>
              <th class="p-3 font-medium">Term</th>
              <th class="p-3 font-medium">Date</th>
              <th class="p-3 font-medium">Monthly</th>
              <th class="p-3 font-medium text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="loanTableBody" class="text-sm divide-y divide-gray-100">
            <tr><td colspan="7" class="p-4 text-center text-gray-400">Loading data...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ================= EXPENSE SECTION ================= -->
    <section id="expenseSection" class="hidden space-y-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <h2 id="expenseFormTitle" class="text-xl font-semibold mb-4 text-gray-900">Add New Expense</h2>
        <form id="expenseForm" onsubmit="submitExpense(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <input type="hidden" id="expense_row_index" value="">
          
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Year</label><input type="number" id="year" value="2026" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Month</label><select id="month" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"><option value="January">January</option><option value="February">February</option><option value="March">March</option><option value="April">April</option><option value="May" selected>May</option><option value="June">June</option><option value="July">July</option><option value="August">August</option><option value="September">September</option><option value="October">October</option><option value="November">November</option><option value="December">December</option></select></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Type of Expense</label><input type="text" id="expense_type" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"></div>
          <div><label class="block text-sm font-medium text-gray-600 mb-1">Amount</label><input type="number" id="expense_amount" step="0.01" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"></div>
          
          <div class="md:col-span-4 flex justify-end space-x-3 mt-2">
            <button type="button" id="expenseCancelBtn" onclick="cancelEdit('expense')" class="hidden px-6 py-2 rounded-lg font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition">Cancel</button>
            <button type="submit" id="expenseSubmitBtn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition font-medium">Save Expense</button>
          </div>
        </form>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 overflow-x-auto">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-semibold text-gray-900">Expense Records</h2>
          <button onclick="fetchData('expenses')" class="text-sm text-green-600 hover:underline">↻ Refresh</button>
        </div>
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200 text-sm text-gray-600">
              <th class="p-3 font-medium">Year</th>
              <th class="p-3 font-medium">Month</th>
              <th class="p-3 font-medium">Type</th>
              <th class="p-3 font-medium">Amount</th>
              <th class="p-3 font-medium text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="expenseTableBody" class="text-sm divide-y divide-gray-100">
            <tr><td colspan="5" class="p-4 text-center text-gray-400">Loading data...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaxrC2tv7nlbiX_pQbkx0kmvqrm17kvhVV5AIClKHWYinpHLU5pwq9Ou1sGQx6IyIt/exec";
    
    // Global variables to store fetched data for easy editing
    let currentLoans = [];
    let currentExpenses = [];

    // Tab Switching
    function switchTab(tab) {
      document.getElementById('loanSection').className = tab === 'loan' ? 'block space-y-6' : 'hidden';
      document.getElementById('expenseSection').className = tab === 'expense' ? 'block space-y-6' : 'hidden';
      document.getElementById('loanTabBtn').className = tab === 'loan' ? 'px-6 py-2 rounded-lg font-medium bg-blue-600 text-white shadow' : 'px-6 py-2 rounded-lg font-medium bg-white text-gray-600 border hover:bg-gray-50';
      document.getElementById('expenseTabBtn').className = tab === 'expense' ? 'px-6 py-2 rounded-lg font-medium bg-white text-gray-600 border hover:bg-gray-50' : 'px-6 py-2 rounded-lg font-medium bg-green-600 text-white shadow';
    }

    const formatMoney = (amount) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amount);
    const formatDateForInput = (isoDate) => isoDate ? new Date(isoDate).toISOString().split('T')[0] : '';

    // Fetch Data
    async function fetchData(sheetName) {
      const tbodyId = sheetName === 'loans' ? 'loanTableBody' : 'expenseTableBody';
      const tbody = document.getElementById(tbodyId);
      tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-gray-400">Loading ${sheetName}...</td></tr>`;

      try {
        const response = await fetch(`${SCRIPT_URL}?sheet=${sheetName}`);
        const result = await response.json();

        if (result.status === "success") {
          if(sheetName === 'loans') currentLoans = result.data;
          if(sheetName === 'expenses') currentExpenses = result.data;
          renderTable(result.data, sheetName, tbody);
        } else {
          tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-red-500">Error: ${result.message}</td></tr>`;
        }
      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-red-500">Failed to connect to server.</td></tr>`;
      }
    }

    // Render Tables
    function renderTable(data, sheetName, tbody) {
      tbody.innerHTML = "";
      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-gray-400">No records found.</td></tr>`;
        return;
      }

      data.forEach(row => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-gray-50 transition border-b border-gray-50";
        
        const actionsHTML = `
          <div class="flex justify-center space-x-2">
            <button onclick="editRecord('${sheetName}', ${row._rowIndex})" class="text-blue-500 hover:text-blue-700 text-xs font-semibold px-2">Edit</button>
            <button onclick="deleteRecord('${sheetName}', ${row._rowIndex})" class="text-red-500 hover:text-red-700 text-xs font-semibold px-2">Delete</button>
          </div>
        `;

        if (sheetName === 'loans') {
          let statusColor = row.status === 'Active' ? 'bg-green-100 text-green-700' : row.status === 'Pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-700';
          tr.innerHTML = `
            <td class="p-3 font-medium text-gray-800">${row.loan_type}</td>
            <td class="p-3"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusColor}">${row.status}</span></td>
            <td class="p-3">${formatMoney(row.amount)}</td>
            <td class="p-3">${row.term} mos</td>
            <td class="p-3 text-gray-500">${new Date(row.date_approved).toLocaleDateString()}</td>
            <td class="p-3">${formatMoney(row.monthly_amortization)}</td>
            <td class="p-3 align-middle">${actionsHTML}</td>
          `;
        } else {
          tr.innerHTML = `
            <td class="p-3 text-gray-500">${row.year}</td>
            <td class="p-3 font-medium text-gray-800">${row.month}</td>
            <td class="p-3">${row.expense_type}</td>
            <td class="p-3 font-semibold text-gray-900">${formatMoney(row.amount)}</td>
            <td class="p-3 align-middle">${actionsHTML}</td>
          `;
        }
        tbody.appendChild(tr);
      });
    }

    // Setup Edit Mode
    function editRecord(sheetName, rowIndex) {
      if (sheetName === 'loans') {
        const record = currentLoans.find(r => r._rowIndex === rowIndex);
        document.getElementById('loan_row_index').value = rowIndex;
        document.getElementById('loan_type').value = record.loan_type;
        document.getElementById('status').value = record.status;
        document.getElementById('amount').value = record.amount;
        document.getElementById('term').value = record.term;
        document.getElementById('date_approved').value = formatDateForInput(record.date_approved);
        document.getElementById('monthly_amortization').value = record.monthly_amortization;
        
        document.getElementById('loanFormTitle').textContent = "Edit Loan Record";
        document.getElementById('loanSubmitBtn').textContent = "Update Loan";
        document.getElementById('loanCancelBtn').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        const record = currentExpenses.find(r => r._rowIndex === rowIndex);
        document.getElementById('expense_row_index').value = rowIndex;
        document.getElementById('year').value = record.year;
        document.getElementById('month').value = record.month;
        document.getElementById('expense_type').value = record.expense_type;
        document.getElementById('expense_amount').value = record.amount;
        
        document.getElementById('expenseFormTitle').textContent = "Edit Expense";
        document.getElementById('expenseSubmitBtn').textContent = "Update Expense";
        document.getElementById('expenseCancelBtn').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    // Cancel Edit
    function cancelEdit(type) {
      if (type === 'loan') {
        document.getElementById('loanForm').reset();
        document.getElementById('loan_row_index').value = "";
        document.getElementById('loanFormTitle').textContent = "Add New Loan";
        document.getElementById('loanSubmitBtn').textContent = "Save Loan";
        document.getElementById('loanCancelBtn').classList.add('hidden');
      } else {
        document.getElementById('expenseForm').reset();
        document.getElementById('expense_row_index').value = "";
        document.getElementById('expenseFormTitle').textContent = "Add New Expense";
        document.getElementById('expenseSubmitBtn').textContent = "Save Expense";
        document.getElementById('expenseCancelBtn').classList.add('hidden');
        document.getElementById('year').value = "2026";
      }
    }

    // Delete Record
    async function deleteRecord(sheetName, rowIndex) {
      if (!confirm("Are you sure you want to delete this record? This cannot be undone.")) return;
      
      const payload = { action: 'delete', sheetName: sheetName, rowIndex: rowIndex };
      
      try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.json();
        if (result.status === "success") {
          fetchData(sheetName);
        } else {
          alert('Failed to delete: ' + result.message);
        }
      } catch (error) {
        alert('Network error while deleting.');
      }
    }

    // Submit Loan
    async function submitLoan(e) {
      e.preventDefault();
      const btn = document.getElementById('loanSubmitBtn');
      const rowIndex = document.getElementById('loan_row_index').value;
      const isEdit = rowIndex !== "";
      
      btn.textContent = "Saving...";
      btn.disabled = true;

      const payload = {
        action: isEdit ? 'edit' : 'add',
        sheetName: "loans",
        rowIndex: isEdit ? parseInt(rowIndex) : null,
        values: [
          document.getElementById('loan_type').value,
          document.getElementById('status').value,
          document.getElementById('amount').value,
          document.getElementById('term').value,
          document.getElementById('date_approved').value,
          document.getElementById('monthly_amortization').value
        ]
      };

      try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.json();
        
        if (result.status === "success") {
          cancelEdit('loan');
          fetchData('loans');
        } else { alert('Failed to save: ' + result.message); }
      } catch (error) { alert('Network error.'); }
      
      btn.disabled = false;
    }

    // Submit Expense
    async function submitExpense(e) {
      e.preventDefault();
      const btn = document.getElementById('expenseSubmitBtn');
      const rowIndex = document.getElementById('expense_row_index').value;
      const isEdit = rowIndex !== "";
      
      btn.textContent = "Saving...";
      btn.disabled = true;

      const payload = {
        action: isEdit ? 'edit' : 'add',
        sheetName: "expenses",
        rowIndex: isEdit ? parseInt(rowIndex) : null,
        values: [
          document.getElementById('year').value,
          document.getElementById('month').value,
          document.getElementById('expense_type').value,
          document.getElementById('expense_amount').value
        ]
      };

      try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.json();
        
        if (result.status === "success") {
          cancelEdit('expense');
          fetchData('expenses');
        } else { alert('Failed to save: ' + result.message); }
      } catch (error) { alert('Network error.'); }
      
      btn.disabled = false;
    }

    window.onload = () => { fetchData('loans'); fetchData('expenses'); };
  </script>
</body>
</html>
